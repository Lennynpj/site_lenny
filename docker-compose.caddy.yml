# Override pour brancher le site sur un Caddy qui tourne en Docker.
# Sur le VPS : cp docker-compose.caddy.yml docker-compose.override.yml
# (il sera alors chargé automatiquement par `docker compose up -d`).
#
# Le service web devient joignable par Caddy sous le nom « site-lenny » :
#   Caddyfile →  muscu.ton-domaine.fr { reverse_proxy site-lenny:80 }
#
# Le réseau de ton Caddy se trouve avec :
#   docker inspect eventpics-caddy --format '{{range $k,$v := .NetworkSettings.Networks}}{{$k}}{{"\n"}}{{end}}'
# S'il est différent du défaut ci-dessous, mets dans un fichier .env :
#   CADDY_NETWORK=le-nom-du-reseau
services:
  web:
    networks:
      default:
      caddy:
        aliases:
          - site-lenny

networks:
  caddy:
    external: true
    name: ${CADDY_NETWORK:-eventpics-prod_default}
