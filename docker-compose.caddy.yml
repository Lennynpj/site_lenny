# Branche le site sur un Caddy qui tourne déjà en Docker (cas de Lenny : eventpics).
# Sur le VPS :
#   cp docker-compose.caddy.yml docker-compose.override.yml
#   docker compose up -d --build        (l'override est chargé automatiquement)
#
# Caddy joint alors le site sous le nom « site-lenny » — dans le Caddyfile :
#   muscu.ton-domaine.fr { reverse_proxy site-lenny:80 }
#
# Le réseau par défaut est celui de la stack eventpics. Si ton Caddy est sur un
# autre réseau, mets dans un fichier .env :  CADDY_NETWORK=le-nom-du-reseau
# (trouve-le avec :
#   docker inspect eventpics-caddy --format '{{range $k,$v := .NetworkSettings.Networks}}{{$k}}{{"\n"}}{{end}}')
services:
  web:
    networks:
      default:
      caddy:
        aliases:
          - site-lenny

networks:
  caddy:
    external: true
    name: ${CADDY_NETWORK:-eventpics-net}
