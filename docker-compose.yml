services:
  mongo:
    image: mongo:8
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    # Décommente pour consulter la base avec Compass (via tunnel SSH uniquement,
    # le port reste bindé sur localhost — jamais exposé sur internet) :
    # ports:
    #   - "127.0.0.1:27017:27017"

  api:
    build: ./server
    restart: unless-stopped
    environment:
      MONGODB_URI: mongodb://mongo:27017/site_lenny
      PORT: "3001"
      # Auth des profils Comptes. Mets un vrai secret dans un fichier .env à la
      # racine (AUTH_SECRET=...) — sinon les sessions ne sont pas sûres.
      AUTH_SECRET: ${AUTH_SECRET:-dev-secret-change-me}
      # Face ID (WebAuthn) : domaine public du site.
      WEBAUTHN_RP_ID: ${WEBAUTHN_RP_ID:-muscu.slidecraft.fr}
      WEBAUTHN_ORIGIN: ${WEBAUTHN_ORIGIN:-https://muscu.slidecraft.fr}
    depends_on:
      - mongo

  web:
    build: ./client
    restart: unless-stopped
    # Aucun port de l'hôte par défaut : le site est joint par le réseau Docker.
    # - Caddy en Docker (recommandé)  → override docker-compose.caddy.yml
    # - Sans Caddy / Caddy hors Docker → override docker-compose.expose.yml
    expose:
      - "80"
    depends_on:
      - api

volumes:
  mongo-data:
