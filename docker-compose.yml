services:
  mongo:
    image: mongo:8
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    # Décommente pour consulter la base avec Compass (via tunnel SSH uniquement,
    # le port reste bindé sur localhost — jamais exposé sur internet) :
    # ports:
    #   - "127.0.0.1:27017:27017"

  api:
    build: ./server
    restart: unless-stopped
    environment:
      MONGODB_URI: mongodb://mongo:27017/site_lenny
      PORT: "3001"
    depends_on:
      - mongo

  web:
    build: ./client
    restart: unless-stopped
    ports:
      # Bindé sur localhost : c'est Caddy (sur le VPS) qui expose le site en HTTPS.
      # Caddyfile : reverse_proxy 127.0.0.1:8080
      # Pour exposer directement sans Caddy : WEB_BIND=0.0.0.0 WEB_PORT=80
      - "${WEB_BIND:-127.0.0.1}:${WEB_PORT:-8080}:80"
    depends_on:
      - api
    # Si ton Caddy tourne lui-même dans Docker : supprime le bloc "ports" ci-dessus,
    # décommente ce bloc et mets le nom du réseau de ton Caddy, puis dans le
    # Caddyfile : reverse_proxy web:80
    # networks:
    #   - default
    #   - caddy
    #
# networks:
#   caddy:
#     external: true
#     name: caddy

volumes:
  mongo-data:
